# Starship 設定
# 高速で美しいプロンプト

# 改行を追加
add_newline = true

# Git設定
[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

# ディレクトリ表示
[directory]
truncation_length = 3
truncate_to_repo = false

# Node.js
[nodejs]
symbol = " "

# Python
[python]
symbol = " "

# Ruby
[ruby]
symbol = " "

# Java
[java]
symbol = " "

# Docker
[docker_context]
symbol = " "

# 時間表示
[time]
disabled = false
format = '🕙[\$time](\$style) '
time_format = "%T"

# コマンド実行時間
[cmd_duration]
min_time = 2_000
format = "⏱️ [$duration]($style)"